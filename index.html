<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbit Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="glow" aria-hidden="true"></div>
    <div class="app">
      <header class="header">
        <div>
          <p class="eyebrow">By: davforge</p>
          <h1>Orbit Chat</h1>
        </div>
        <div class="status-group">
          <div class="status" id="status">Ready</div>
          <div class="status key-status" id="keyStatus">Key: Not tested</div>
        </div>
      </header>

      <section class="panel">
        <div class="field">
          <label for="provider">Provider</label>
          <select id="provider">
            <option value="openrouter">OpenRouter</option>
            <option value="openai">OpenAI</option>
          </select>
        </div>

        <div class="field">
          <label for="apiKey" id="apiKeyLabel">OpenRouter API Key</label>
          <div class="inline">
            <input
              id="apiKey"
              type="password"
              placeholder="sk-or-..."
              autocomplete="off"
              spellcheck="false"
            />
            <button id="toggleKey" class="ghost" type="button">Show</button>
            <button id="saveKey" class="ghost" type="button">Save & Test</button>
          </div>
          <p class="hint">Stored locally only if you press Save.</p>
        </div>

        <div class="grid">
          <div class="field">
            <label for="modelSelect">Model</label>
            <select id="modelSelect">
              <option value="openrouter/free">openrouter/free</option>
              <option value="google/gemma-3-4b-it:free">google/gemma-3-4b-it:free</option>
              <option value="nvidia/nemotron-nano-12b-v2-vl:free">nvidia/nemotron-nano-12b-v2-vl:free</option>
              <option value="stepfun/step-3.5-flash:free">stepfun/step-3.5-flash:free</option>
              <option value="custom">Custom</option>
            </select>
            <input id="customModel" type="text" placeholder="Enter custom model" />
          </div>
        </div>

        <details class="field">
          <summary>System Prompt</summary>
          <textarea id="systemPrompt" rows="3" placeholder="Set the assistant persona or rules..."></textarea>
        </details>

      </section>

      <section class="chat">
        <div id="messages" class="messages"></div>
      </section>

      <section class="composer">
        <div class="composer-inputs">
          <div class="composer-row">
            <input id="imageUpload" type="file" accept="image/*" multiple />
            <label class="upload-button ghost" for="imageUpload" title="Upload images">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path
                  d="M12 5v14M5 12h14"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </label>
            <textarea
              id="userInput"
              rows="2"
              placeholder="Ask anything..."
              spellcheck="true"
            ></textarea>
          </div>
          <div id="imageQueue" class="image-queue"></div>
          <span class="hint" id="imageWarning">Pick an image compatible model for uploads.</span>
        </div>
        <div class="composer-actions">
          <button id="clearChat" class="ghost" type="button">Clear</button>
          <button id="send" class="primary" type="button">Send</button>
        </div>
      </section>

      <footer class="footer">
        <p>Tip: Shift + Enter for a new line. OpenRouter requests run in your browser.</p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
